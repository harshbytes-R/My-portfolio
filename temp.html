<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>temp</title>
    <style>
        *{
            background-color: black;
            color: white;
        }
        .box{
            border: 2px solid white;
              margin: 250px;
              padding-bottom: 20px;
            
        }
        h1{
            justify-self: center;
          
            font-size: 50px;
        }
        .option{
            display: flex;
            justify-content: space-evenly;
            
        }
        a{
            font-size: 50px;
            text-decoration: none;
            margin-top: 45px;
            padding: 12px 35px;
            border-radius: 9999px;
            background-color:aqua;
        }
       
        .no{
           background-color:rgb(189, 157, 157);
        }
        .no:hover{
            transform: translatey(-5px);
            background-color: gray;
        }
        .yes{
            background-color: rgb(106, 106, 222);
        }
        .yes:hover{
            transform: translatey(-5px);
            background-color:blue;
        }
    </style>
</head>
<body>
    <div class="box">
    <h1>Are You Sure?</h1>
    <div class="option">
    <a class="no" href="index.html">No</a>
    <a class="yes" href="middle-finger-emoji-clipart-lg.png"">Yes</a>
    </div>
    </div>
</body>
</html>
